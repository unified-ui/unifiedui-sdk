name: CI вҖ” PR Branch Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  branch-naming:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|hotfix|release|develop)/"
          
          # Allow special branches without prefix
          if [[ "$BRANCH" == "develop" || "$BRANCH" == "main" ]]; then
            echo "вң… Branch '$BRANCH' is a protected branch вҖ” allowed."
            exit 0
          fi
          
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "вқҢ Branch name '$BRANCH' does not follow convention."
            echo ""
            echo "   Expected: <type>/<description>"
            echo ""
            echo "   Types:"
            echo "     feat/     - New feature"
            echo "     fix/      - Bug fix"
            echo "     hotfix/   - Urgent production fix"
            echo "     release/  - Release preparation"
            echo "     docs/     - Documentation only"
            echo "     refactor/ - Code refactoring"
            echo "     test/     - Adding tests"
            echo "     ci/       - CI/CD changes"
            echo "     chore/    - Maintenance tasks"
            exit 1
          fi
          echo "вң… Branch name '$BRANCH' is valid."

  branch-target:
    name: Validate PR Target
    runs-on: ubuntu-latest
    steps:
      - name: Check PR target branch rules
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"
          
          echo "рҹ“Ӣ PR: $SOURCE вҶ’ $TARGET"
          echo ""
          
          # Rules for PRs to main
          if [[ "$TARGET" == "main" ]]; then
            # Allowed: develop, hotfix/*, release/*
            if [[ "$SOURCE" == "develop" || "$SOURCE" =~ ^hotfix/ || "$SOURCE" =~ ^release/ ]]; then
              echo "вң… PR to 'main' from '$SOURCE' is allowed."
              exit 0
            else
              echo "вқҢ PRs to 'main' are only allowed from:"
              echo "   вҖў develop"
              echo "   вҖў hotfix/*"
              echo "   вҖў release/*"
              echo ""
              echo "   Your branch: $SOURCE"
              echo ""
              echo "   рҹ“– Branching Strategy:"
              echo "   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"
              echo "   в”Ӯ  feat/* в”Җв”Җв”җ                                        в”Ӯ"
              echo "   в”Ӯ  fix/*  в”Җв”Җв”јв”Җв”Җв–¶ develop в”Җв”Җв–¶ release/* в”Җв”Җв–¶ main     в”Ӯ"
              echo "   в”Ӯ           в”Ӯ                    в”Ӯ                   в”Ӯ"
              echo "   в”Ӯ           в”Ӯ              hotfix/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶   в”Ӯ"
              echo "   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
              exit 1
            fi
          fi
          
          # Rules for PRs to develop
          if [[ "$TARGET" == "develop" ]]; then
            # Allowed: feat/*, fix/*, docs/*, refactor/*, test/*, ci/*, chore/*, style/*, perf/*, build/*, revert/*
            if [[ "$SOURCE" =~ ^(feat|fix|docs|refactor|test|ci|chore|style|perf|build|revert)/ ]]; then
              echo "вң… PR to 'develop' from '$SOURCE' is allowed."
              exit 0
            # Also allow merging back from release/* or hotfix/* (backports)
            elif [[ "$SOURCE" =~ ^(release|hotfix)/ ]]; then
              echo "вң… PR to 'develop' from '$SOURCE' (backport) is allowed."
              exit 0
            else
              echo "вқҢ PRs to 'develop' are only allowed from:"
              echo "   вҖў feat/*"
              echo "   вҖў fix/*"
              echo "   вҖў docs/*"
              echo "   вҖў refactor/*"
              echo "   вҖў test/*"
              echo "   вҖў ci/*"
              echo "   вҖў chore/*"
              echo "   вҖў release/* (backport)"
              echo "   вҖў hotfix/* (backport)"
              echo ""
              echo "   Your branch: $SOURCE"
              exit 1
            fi
          fi
          
          # Other targets (feature branches, etc.) вҖ” allow all
          echo "вң… PR to '$TARGET' from '$SOURCE' is allowed (no restrictions)."
