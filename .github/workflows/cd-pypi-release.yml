name: CD — PyPI Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write  # For creating tags
  id-token: write  # For PyPI trusted publishing

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # Prevent duplicate runs from merge commits
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for tags

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Calculate next version
        id: version
        run: |
          # Read floor version from pyproject.toml
          FLOOR=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "floor=$FLOOR" >> $GITHUB_OUTPUT

          # Query PyPI for current version
          CURRENT=$(curl -s https://pypi.org/pypi/unifiedui-sdk/json 2>/dev/null | python -c "import sys, json; d=json.load(sys.stdin); print(d['info']['version'])" 2>/dev/null || echo "")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          # Calculate next version using Python
          NEXT=$(python << EOF
          import re

          floor = "$FLOOR"
          current = "$CURRENT"

          def parse(v):
              m = re.match(r'(\d+)\.(\d+)\.(\d+)', v)
              return (int(m.group(1)), int(m.group(2)), int(m.group(3))) if m else (0, 0, 0)

          if not current:
              next_ver = floor
          else:
              f = parse(floor)
              c = parse(current)
              if (f[0], f[1]) > (c[0], c[1]):
                  next_ver = floor
              else:
                  next_ver = f"{c[0]}.{c[1]}.{c[2] + 1}"

          print(next_ver)
          EOF
          )
          echo "version=$NEXT" >> $GITHUB_OUTPUT

          echo "📊 Version Calculation:"
          echo "   Floor (pyproject.toml): $FLOOR"
          echo "   Current (PyPI): ${CURRENT:-'not published'}"
          echo "   Next: $NEXT"

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git tag -l "v$VERSION" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag v$VERSION already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag v$VERSION will be created"
          fi

      - name: Update version in pyproject.toml
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "📝 Updated pyproject.toml to version $VERSION"
          grep "^version" pyproject.toml

      - name: Build package
        if: steps.check.outputs.exists == 'false'
        run: |
          uv build
          echo "📦 Built package:"
          ls -la dist/

      - name: Create Git tag
        if: steps.check.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "🏷️ Created and pushed tag v$VERSION"

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) — no API token needed
        # Configure at: https://pypi.org/manage/project/unifiedui-sdk/settings/publishing/

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS="${{ steps.version.outputs.current }}"

          # Get the previous tag or use first commit
          if [ -n "$PREVIOUS" ] && git tag -l "v$PREVIOUS" | grep -q .; then
            PREV_TAG="v$PREVIOUS"
          else
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating changelog from $PREV_TAG to HEAD..."

          # Generate changelog from conventional commits
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATURES=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s|%h" | grep -E "^feat(\(.+\))?:" | head -20 || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEATURES" | while IFS='|' read -r msg hash; do
                clean_msg=$(echo "$msg" | sed -E 's/^feat(\([^)]+\))?:\s*//')
                echo "- $clean_msg (\`$hash\`)"
              done
              echo ""
            fi

            # Bug fixes
            FIXES=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s|%h" | grep -E "^fix(\(.+\))?:" | head -20 || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES" | while IFS='|' read -r msg hash; do
                clean_msg=$(echo "$msg" | sed -E 's/^fix(\([^)]+\))?:\s*//')
                echo "- $clean_msg (\`$hash\`)"
              done
              echo ""
            fi

            # Documentation
            DOCS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s|%h" | grep -E "^docs(\(.+\))?:" | head -10 || true)
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo ""
              echo "$DOCS" | while IFS='|' read -r msg hash; do
                clean_msg=$(echo "$msg" | sed -E 's/^docs(\([^)]+\))?:\s*//')
                echo "- $clean_msg (\`$hash\`)"
              done
              echo ""
            fi

            # Other changes (refactor, perf, test, chore, ci, build)
            OTHERS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s|%h" | grep -E "^(refactor|perf|test|chore|ci|build)(\(.+\))?:" | head -10 || true)
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other Changes"
              echo ""
              echo "$OTHERS" | while IFS='|' read -r msg hash; do
                clean_msg=$(echo "$msg" | sed -E 's/^(refactor|perf|test|chore|ci|build)(\([^)]+\))?:\s*//')
                echo "- $clean_msg (\`$hash\`)"
              done
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v$PREVIOUS...v$VERSION"
            echo ""
            echo "**PyPI**: https://pypi.org/project/unifiedui-sdk/$VERSION/"

          } > changelog.md

          echo "📋 Generated changelog:"
          cat changelog.md

          # Store changelog for GitHub Release
          {
            echo 'body<<EOF'
            cat changelog.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          EXISTS="${{ steps.check.outputs.exists }}"

          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Floor Version | \`${{ steps.version.outputs.floor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | \`${{ steps.version.outputs.current || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag Exists | $EXISTS |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | $DRY_RUN |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$EXISTS" == "true" ]]; then
            echo "⚠️ **Skipped**: Tag already exists" >> $GITHUB_STEP_SUMMARY
          elif [[ "$DRY_RUN" == "true" ]]; then
            echo "🧪 **Dry Run**: No changes made" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Released**:" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 [PyPI v$VERSION](https://pypi.org/project/unifiedui-sdk/$VERSION/)" >> $GITHUB_STEP_SUMMARY
            echo "- 🏷️ [GitHub Release v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
          fi
